<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#6366f1"/>
  <!-- Left node -->
  <rect x="2" y="12" width="10" height="8" rx="2" fill="white"/>
  <!-- Top-right node -->
  <rect x="20" y="3" width="10" height="8" rx="2" fill="white"/>
  <!-- Bottom-right node -->
  <rect x="20" y="21" width="10" height="8" rx="2" fill="white"/>
  <!-- Connector: left node exit → T-junction → top-right node -->
  <path d="M12 16 H16 V7 H20" stroke="white" stroke-width="1.75" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
  <!-- Connector: T-junction → bottom-right node -->
  <path d="M16 16 V25 H20" stroke="white" stroke-width="1.75" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
</svg>
